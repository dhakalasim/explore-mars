<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nepal to Mars Mission</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-card">
        <div class="hero-copy">
          <p class="eyebrow">Mission Control</p>
          <h1>Take the Nepalese to Mars</h1>
          <p class="hero-text">
            Learn how each rocket part works, activate the system, and guide the
            crew safely from Earth to the red planet.
          </p>
          <button id="launchButton" class="primary-btn">Launch Mission</button>
        </div>
        <div class="rocket-visual" aria-label="Rocket illustration">
          <div class="rocket">
            <div class="nose"></div>
            <div class="body"></div>
            <div class="fin fin-left"></div>
            <div class="fin fin-right"></div>
            <div class="engine"></div>
          </div>
        </div>
      </section>

      <section class="status-card">
        <div class="status-header">
          <h2>Mission Status</h2>
          <span id="missionBadge" class="badge ready">Preparation</span>
        </div>
        <p id="missionMessage" class="status-message">
          Activate every rocket subsystem to prepare the Nepalese crew for launch.
        </p>
        <div class="progress-track">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <ul id="missionLog" class="mission-log"></ul>
      </section>

      <section class="parts-card">
        <h2>Rocket Parts</h2>
        <div id="partsGrid" class="parts-grid"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
